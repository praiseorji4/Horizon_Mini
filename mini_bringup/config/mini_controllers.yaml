controller_manager:
  ros__parameters:
    update_rate: 50  # Hz
    use_sim_time: false

    diff_drive_controller:
      type: diff_drive_controller/DiffDriveController

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    imu_sensor_broadcaster:
      type: imu_sensor_broadcaster/IMUSensorBroadcaster

diff_drive_controller:
  ros__parameters:
    # Match the joint names exactly as defined in your ubot_wheel.urdf.xacro
    left_wheel_names: ["front_left_wheel_joint", "rear_left_wheel_joint"]
    right_wheel_names: ["front_right_wheel_joint", "rear_right_wheel_joint"]

    # Geometric parameters (based on your URDF properties)
    wheel_separation: 0.45 # 2 * wheel_yoff 0.2020
    wheel_radius: 0.022    # wheel_radius

    # Odometry settings
    publish_rate: 50.0
    odom_frame_id: odom
    base_frame_id: base_footprint
    enable_odom_tf: true


    # Add these to prevent resets
    pose_covariance_diagonal: [0.001, 0.001, 0.001, 0.001, 0.001, 0.03]
    twist_covariance_diagonal: [0.001, 0.001, 0.001, 0.001, 0.001, 0.03]
    open_loop: false

    # Constraints for smooth movement
    linear:
      x:
        has_velocity_limits: true
        max_velocity: 1.0
        min_velocity: -1.0
    angular:
      z:
        has_velocity_limits: true
        max_velocity: 2.0
        min_velocity: -2.0

joint_state_broadcaster:
  ros__parameters:
    use_sim_time: false